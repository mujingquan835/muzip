name: MUZIP
options:
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: 5.9
    PRODUCT_NAME: $(TARGET_NAME)
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: NO
    CODE_SIGN_STYLE: Automatic
targets:
  MUZIP:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources
      - path: Resources/Assets.xcassets
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.muzip.app
    entitlements:
      path: App/MUZIP.entitlements
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: MUZIP
        CFBundleIdentifier: com.muzip.app
        CFBundleName: MUZIP
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSApplicationCategoryType: public.app-category.productivity
        LSMinimumSystemVersion: "14.0"
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication
        NSServices:
          - NSMenuItem:
              default: 使用 MUZIP 压缩
            NSMessage: compressSelection
            NSPortName: MUZIP
            NSSendFileTypes:
              - public.data
              - public.folder
        CFBundleDocumentTypes:
          - CFBundleTypeName: 文件和文件夹
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.data
              - public.folder
